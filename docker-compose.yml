services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=cosmetic_db;Username=postgres;Password=postgres
      ADMIN_USERNAME: admin1
      ADMIN_PASSWORD: Aadmin123
      ObjectStorage__Endpoint: minio:9000
      ObjectStorage__PublicBaseUrl: https://valmeris/storage
      ObjectStorage__AccessKey: minioadmin
      ObjectStorage__SecretKey: minioadmin123
      ObjectStorage__BucketName: product-images
      ObjectStorage__UseSsl: false
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - app-network

  db:
    image: postgres:latest
    container_name: cosmetic-postgres
    environment:
      POSTGRES_DB: cosmetic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - cosmetic_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cosmetic_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - app-network

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/product-images &&
      mc anonymous set download local/product-images
      "
    networks:
      - app-network

  frontend:
    build:
      context: "G:/Projects/React_TS/cosmetic-enterprise-front"
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - backend
      - frontend
      - minio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - app-network

volumes:
  cosmetic_pgdata:
  minio_data:

networks:
  app-network: